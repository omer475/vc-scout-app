name: Keep backend awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          curl -fsS --max-time 90 -o /dev/null -w "code=%{http_code} time=%{time_total}s\n" \
            https://vc-scout-backend.onrender.com/api/sources
